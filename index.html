<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OEC Rebuilt Scouting</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="home-layout">
      <section class="home-card">
        <img class="team-logo" src="assets/LOGO(1).png" alt="OEC Rebuilt Scouting logo" />
        <p class="status-pill">FRC: 4122</p>
        <h1>OEC Rebuilt Scouting</h1>

        <div class="button-column">
          <a class="nav-button" href="match-scouting.html">Match Scouting</a>
          <a class="nav-button" href="pit-scouting.html">Pit Scouting</a>
        </div>
      </section>

      <section class="home-card info-card">
        <p>If the scouting entries do not save, download the CSV and text it to my phone number: (914) 387-6407 (Floyd).</p>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app-sync.js"></script>
    <script>
      window.ScoutingSync.registerServiceWorker();
      const savedMessage = sessionStorage.getItem("scouting_toast");
      if (savedMessage) {
        window.ScoutingSync.showToast(savedMessage);
        sessionStorage.removeItem("scouting_toast");
      }
      window.ScoutingSync.flushPendingUploads();
    </script>
  </body>
</html>
