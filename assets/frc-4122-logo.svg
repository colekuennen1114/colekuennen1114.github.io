<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">FRC Team 4122 logo</title>
  <desc id="desc">Three interlocking gears in maroon and charcoal.</desc>
  <defs>
    <g id="gear">
      <circle r="38" fill="currentColor"/>
      <circle r="20" fill="#050505"/>
      <g fill="currentColor">
        <rect x="-7" y="-56" width="14" height="18" rx="3"/>
        <rect x="-7" y="38" width="14" height="18" rx="3"/>
        <rect x="38" y="-7" width="18" height="14" rx="3"/>
        <rect x="-56" y="-7" width="18" height="14" rx="3"/>
        <rect x="31" y="-45" width="14" height="18" rx="3" transform="rotate(45)"/>
        <rect x="-45" y="31" width="14" height="18" rx="3" transform="rotate(45)"/>
        <rect x="31" y="27" width="14" height="18" rx="3" transform="rotate(-45)"/>
        <rect x="-45" y="-49" width="14" height="18" rx="3" transform="rotate(-45)"/>
      </g>
    </g>
  </defs>
  <g transform="translate(68 110) scale(1.1)" style="color:#8a1538">
    <use href="#gear"/>
  </g>
  <g transform="translate(116 127) scale(0.88)" style="color:#545454">
    <use href="#gear"/>
  </g>
  <g transform="translate(93 53) scale(0.62)" style="color:#a61d4d">
    <use href="#gear"/>
  </g>
</svg>
